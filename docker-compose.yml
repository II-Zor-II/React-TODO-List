services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-todoapp}
    ports:
      - "0.0.0.0:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-todoapp}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    ports:
      - "0.0.0.0:3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-todoapp}?schema=public
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-todoapp}
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app
      - app_node_modules:/app/node_modules
    networks:
      - app-network

  # --- Test services (activate with: docker compose --profile test up -d) ---

  db-test:
    image: postgres:17-alpine
    profiles: [test]
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todoapp_test
    ports:
      - "0.0.0.0:5433:5432"
    volumes:
      - pgdata_test:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d todoapp_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  app-test:
    build:
      context: .
      dockerfile: docker/Dockerfile
    profiles: [test]
    restart: unless-stopped
    ports:
      - "0.0.0.0:3001:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db-test:5432/todoapp_test?schema=public
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todoapp_test
      DB_HOST: db-test
      DB_PORT: 5432
    depends_on:
      db-test:
        condition: service_healthy
    volumes:
      - ./app:/app
      - app_test_node_modules:/app/node_modules
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
  app_node_modules:
  pgdata_test:
  app_test_node_modules:
